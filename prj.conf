CONFIG_CACHE_MANAGEMENT=y
CONFIG_ICACHE=y

CONFIG_LOG=y
# All logging handled in dedicated thread (format + output); callers only enqueue
CONFIG_LOG_MODE_DEFERRED=y
# Increase buffer so high-rate logs don't drop (tune if needed)
CONFIG_LOG_BUFFER_SIZE=2048
# No log output - required when MCUmgr shares UART with console (camera running)
# Any log output can corrupt SMP responses. Use 1+ for debug when camera is off.
CONFIG_LOG_DEFAULT_LEVEL=0

# Full libc for TFLM and general use
CONFIG_REQUIRES_FULL_LIBC=y

CONFIG_DISPLAY=y
CONFIG_MIPI_DBI=y
CONFIG_SPI=y
CONFIG_SPI_STM32_DMA=y
CONFIG_GPIO=y
CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_DMA=y
# UART DMA: when console UART has dmas in devicetree (uart_dma.overlay),
# the STM32 driver uses DMA if its Kconfig supports it (symbol name may vary per Zephyr/board).

CONFIG_I2C=y
CONFIG_VIDEO=y
CONFIG_VIDEO_OV5640=y
# Use out-of-tree STM32U5 DCMI driver (st,stm32u5-dcmi); in-tree driver not used
# CONFIG_VIDEO_STM32_DCMI=n
CONFIG_VIDEO_STM32U5_DCMI=y

CONFIG_HEAP_MEM_POOL_SIZE=196608
# Pool unused when using static camera buffers; keep minimal to save RAM
CONFIG_VIDEO_BUFFER_POOL_SZ_MAX=64
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=2
CONFIG_VIDEO_BUFFER_POOL_ALIGN=64

# CONFIG_VIDEO_LOG_LEVEL_DBG=y
# CONFIG_DMA_LOG_LEVEL_DBG=y

CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_TENSORFLOW_LITE_MICRO=y
# Enable optimized CMSIS-NN kernels for TFLM (faster conv/depthwise/FC)
CONFIG_TENSORFLOW_LITE_MICRO_CMSIS_NN_KERNELS=y
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_REQUIRES_FLOAT_PRINTF=y

# MCUBoot bootloader support
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
# Erase progressively so device responds faster (avoids full-slot erase before first chunk)
CONFIG_IMG_ERASE_PROGRESSIVELY=y

# MCUmgr SMP over UART (firmware update)
CONFIG_MCUMGR=y
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
# Pause camera/inference when ANY SMP command received (reduces UART contention during DFU)
CONFIG_MCUMGR_MGMT_NOTIFICATION_HOOKS=y
CONFIG_MCUMGR_SMP_COMMAND_STATUS_HOOKS=y
# DFU_STARTED/DFU_STOPPED for "Updating Firmware" display (CMD_RECV/DONE fire per-chunk, too brief)
CONFIG_MCUMGR_GRP_IMG_STATUS_HOOKS=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
# Higher priority than camera (7) so MCUmgr image handler can preempt during DFU
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=0
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=1024
CONFIG_MPU_ALLOW_FLASH_WRITE=y
