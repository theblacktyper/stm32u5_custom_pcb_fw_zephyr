# MCUBoot configuration overrides for edgeaiproto board
CONFIG_MCUBOOT_LOG_LEVEL_DBG=y
# Disable downgrade prevention so same-version OTA updates work (MCUboot otherwise
# rejects images with version <= current). Re-enable for production with proper versioning.
CONFIG_MCUBOOT_DOWNGRADE_PREVENTION=n
CONFIG_BOOT_MAX_IMG_SECTORS=96
CONFIG_FLASH=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
